<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Контакты | AIDUX</title>
<link rel="stylesheet" href="style.css">

<style>
input, textarea {
    width: 100%;
    padding: 15px;
    margin-bottom: 15px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    color: white;
    outline: none;
}
input::placeholder, textarea::placeholder {
    color: rgba(255,255,255,0.5);
}
input:focus, textarea:focus {
    border-color: #2e7d32;
}
</style>
</head>

<body>

<header class="nav glass">
    <a href="index.html" class="logo">AIDUX</a>
    <nav class="nav-links">
        <a href="index.html">Главная</a>
        <a href="about.html">О проекте</a>
        <a href="map.html">Карта</a>
        <a href="contact.html">Связь</a>
    </nav>
</header>

<main class="container">
<section class="glass hidden" style="max-width: 600px; margin: 40px auto; padding: 40px;">
    
    <h2 style="text-align: center; margin-bottom: 25px;">Связаться с нами</h2>

    <form id="form">
        <input type="text" placeholder="Ваше имя" required>
        <input type="email" placeholder="Ваш Email" required>
        <textarea placeholder="Ваше сообщение..." rows="5" required></textarea>
        <button type="submit" class="btn" style="width: 100%;">Отправить</button>
    </form>

    <div id="msg" style="display:none; text-align: center; margin-top: 20px; color: #a5ffb1;">
        Сообщение отправлено ✅
    </div>

</section>
</main>

<footer style="text-align: center; padding: 50px; opacity: 0.5;">
    © 2026 AIDUX Digital Project | Костанай
</footer>

<!-- Голосовой ассистент -->
<button id="voiceBtn">🎤</button>
<div id="voiceText">AIDUX готов</div>

<script src="script.js"></script>
<script src="voice.js"></script>

<script>
// форма
const form = document.getElementById("form");
const msg = document.getElementById("msg");

form.addEventListener("submit", e => {
    e.preventDefault();
    msg.style.display = "block";
    form.reset();
});
</script>

</body>
</html>
