<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIDUX | Карта</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/three@0.147.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.147.0/examples/js/loaders/GLTFLoader.js"></script>
    <link rel="stylesheet" href="style.css">

    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; }
        .nav { position: fixed; top: 0; width: 100%; z-index: 3000; background: rgba(0,0,0,0.9); }
        .glass { background: rgba(0,0,0,0.8); border: 1px solid #2e7d32; border-radius: 12px; }
        
        #smart-panel { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); z-index: 3000; width: 90%; max-width: 450px; display: flex; flex-direction: column; gap: 8px; padding: 12px; }
        .toggle-group { display: flex; gap: 8px; }
        .toggle-btn { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #2e7d32; color: white; background: rgba(0,0,0,0.5); cursor: pointer; font-weight: bold; }
        .active { background: #2e7d32 !important; box-shadow: 0 0 10px #2e7d32; }
        
        .search-row { display: flex; gap: 5px; }
        #target-input { flex: 1; padding: 10px; background: rgba(0,0,0,0.8); border: 1px solid #2e7d32; color: #a5ffb1; border-radius: 6px; outline: none; }
        .icon-btn { width: 40px; height: 40px; background: #2e7d32; color: white; border: none; border-radius: 6px; cursor: pointer; }
        
        #lang-select { background: #050505; color: #a5ffb1; border: 1px solid #2e7d32; border-radius: 6px; padding: 5px; }

        #map-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; }
        #status-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 3000; color: #a5ffb1; padding: 8px; text-align: center; width: 80%; }
        
        a-scene { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; }
    </style>
</head>
<body>

<header class="nav glass">
    <a href="index.html" class="logo" style="padding: 10px; color: #a5ffb1; text-decoration: none; font-weight: bold;">AIDUX</a>
    <nav class="nav-links" style="display: flex; gap: 10px; padding: 10px;">
        <a href="index.html" style="color: white; text-decoration: none;">Главная</a>
        <a href="about.html" style="color: white; text-decoration: none;">О проекте</a>
        <a href="map.html" style="color: #a5ffb1; text-decoration: none;">Карта</a>
        <a href="contact.html" style="color: white; text-decoration: none;">Связь</a>
    </nav>
</header>

<div id="smart-panel" class="glass">
    <div class="toggle-group">
        <button id="btn-map" class="toggle-btn active">🗺️ Карта</button>
        <button id="btn-cam" class="toggle-btn">📷 Камера</button>
    </div>
    <div class="search-row">
        <select id="lang-select">
            <option value="ru-RU">RU</option>
            <option value="kk-KZ">KZ</option>
            <option value="en-US">EN</option>
        </select>
        <input type="text" id="target-input" placeholder="Адрес / Сұрау / Query">
        <button id="mic-btn" class="icon-btn">🎤</button>
        <button id="go-btn" class="icon-btn">🚀</button>
    </div>
    <button id="audio-help-btn" class="toggle-btn">🔊 Звук: ВЫКЛ</button>
</div>

<div id="status-bar" class="glass">Готов к работе</div>
<div id="map-container"><div id="map" style="width: 100%; height: 100%;"></div></div>

<a-scene id="ar-scene" embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;" background="color: #050505" style="display: none;">
    <a-camera gps-camera rotation-reader></a-camera>
</a-scene>

<script>
    const locationsDB = [
        { lat: 53.747230, lng: 62.063310, aliases: ["акимат", "akimat", "әкімдік"] },
        { lat: 53.746552, lng: 62.061850, aliases: ["дюсш", "спорт", "sport", "css"] },
        { lat: 53.746725, lng: 62.062435, aliases: ["дом культуры", "дк", "мәдениет үйі", "house of culture"] },
        { lat: 53.746725, lng: 62.062435, aliases: ["мечеть", "mosque", "мешіт"] },
        { lat: 53.748110, lng: 62.053638, aliases: ["школа 1", "школа №1", "мектеп 1", "school 1", "мектеп №1", "school №1"] },
        { lat: 53.749254, lng: 62.070684, aliases: ["школа 2", "школа №2", "мектеп 2", "school 2", "мектеп №2", "school №2"] }
    ];

    const dict = {
        "привет": "Привет! Жду команд.",
        "сәлем": "Сәлем! Жұмысқа дайынмын.",
        "hello": "Hello! Ready to work."
    };

    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
        center: [62.062, 53.747],
        zoom: 15,
        pitch: 60,
        bearing: 0,
        antialias: true
    });

    const modelOrigin = [62.0609, 53.7471];
    const mercator = maplibregl.MercatorCoordinate.fromLngLat(modelOrigin, 0);

    const customLayer = {
        id: '3d-model', type: 'custom', renderingMode: '3d',
        onAdd: function (map, gl) {
            this.camera = new THREE.Camera();
            this.scene = new THREE.Scene();
            this.scene.add(new THREE.AmbientLight(0xffffff, 1));
            new THREE.GLTFLoader().load('doomr.glb', (gltf) => { this.scene.add(gltf.scene); });
            this.renderer = new THREE.WebGLRenderer({ canvas: map.getCanvas(), context: gl, antialias: true });
            this.renderer.autoClear = false;
        },
        render: function (gl, matrix) {
            const m = new THREE.Matrix4().fromArray(matrix);
            const l = new THREE.Matrix4()
                .makeTranslation(mercator.x, mercator.y, mercator.z)
                .scale(new THREE.Vector3(mercator.meterInMercatorCoordinateUnits(), -mercator.meterInMercatorCoordinateUnits(), mercator.meterInMercatorCoordinateUnits()))
                .multiply(new THREE.Matrix4().makeRotationX(Math.PI / 2));
            this.camera.projectionMatrix = m.multiply(l);
            this.renderer.resetState();
            this.renderer.render(this.scene, this.camera);
            map.triggerRepaint();
        }
    };

    map.on('style.load', () => { 
        map.addLayer(customLayer); 
        map.addSource('route', { type: 'geojson', data: { type: 'Feature', coordinates: [] } });
        map.addLayer({ id: 'route-line', type: 'line', source: 'route', paint: { 'line-color': '#00ff00', 'line-width': 6 } });
    });

    let audioOn = false;
    const statBar = document.getElementById('status-bar');

    function speak(text, lang) {
        statBar.innerText = text;
        if (!audioOn) return;
        const u = new SpeechSynthesisUtterance(text);
        u.lang = lang;
        window.speechSynthesis.speak(u);
    }

    async function route(query) {
        const lang = document.getElementById('lang-select').value;
        
        for (let key in dict) {
            if (query.includes(key)) return speak(dict[key], lang);
        }

        const target = locationsDB.find(l => l.aliases.some(a => query.includes(a)));
        if (!target) return speak("Не найдено / Табылмады", lang);

        navigator.geolocation.getCurrentPosition(async (p) => {
            const url = `https://router.project-osrm.org/route/v1/foot/${p.coords.longitude},${p.coords.latitude};${target.lng},${target.lat}?overview=full&geometries=geojson`;
            const res = await fetch(url);
            const data = await res.json();
            if (data.routes[0]) {
                map.getSource('route').setData(data.routes[0].geometry);
                speak("Маршрут построен / Маршрут құрылды", lang);
            }
        });
    }

    document.getElementById('go-btn').onclick = () => route(document.getElementById('target-input').value.toLowerCase());
    
    document.getElementById('audio-help-btn').onclick = function() { 
        audioOn = !audioOn; 
        this.innerText = audioOn ? "🔊 Звук: ВКЛ" : "🔊 Звук: ВЫКЛ";
        this.classList.toggle('active');
    };

    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    document.getElementById('mic-btn').onclick = () => {
        rec.lang = document.getElementById('lang-select').value;
        rec.start();
        statBar.innerText = "Слушаю / Тыңдап тұрмын...";
    };
    rec.onresult = (e) => {
        const t = e.results[0][0].transcript.toLowerCase();
        document.getElementById('target-input').value = t;
        route(t);
    };

    document.getElementById('btn-map').onclick = function() { 
        this.classList.add('active'); document.getElementById('btn-cam').classList.remove('active');
        document.getElementById('map-container').style.zIndex = 100; 
        document.getElementById('ar-scene').style.display='none'; 
    };
    document.getElementById('btn-cam').onclick = function() { 
        this.classList.add('active'); document.getElementById('btn-map').classList.remove('active');
        document.getElementById('map-container').style.zIndex = 10; 
        document.getElementById('ar-scene').style.display='block'; 
    };
</script>
</body>
</html>
