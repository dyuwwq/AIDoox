<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIDUX Map | VR Ready</title>
<link rel="stylesheet" href="style.css">
<style>
  body { margin: 0; overflow: hidden; background: radial-gradient(circle at top right, #0b2e13, #050505); }
  canvas { display: block; }
  #vrButton {
    position: absolute; top: 20px; left: 20px; z-index: 1000;
    padding: 12px 25px; background: #2e7d32; color: white;
    border: none; border-radius: 10px; cursor: pointer;
    font-weight: bold; font-size: 1rem;
  }
</style>
</head>
<body>

<header class="nav glass">
    <a href="index.html" class="logo">AIDUX</a>
    <nav class="nav-links">
        <a href="index.html">Главная</a>
        <a href="about.html">О проекте</a>
        <a href="map.html">Карта</a>
        <a href="contact.html">Связь</a>
    </nav>
</header>

<!-- VR кнопка -->
<button id="vrButton">Enter VR</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
  // 1️ Сцена
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0b2e13);

  // 2️ Камера
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 1.6, 3);

  // 3️ Рендерер
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  // 4️ Простая карта (куб заменяет твою карту, потом вставим модель)
  const geometry = new THREE.BoxGeometry(3, 0.1, 3);
  const material = new THREE.MeshStandardMaterial({ color: 0x007700 });
  const map = new THREE.Mesh(geometry, material);
  map.position.set(0, 0, 0);
  scene.add(map);

  // 5️ Освещение
  const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
  light.position.set(0, 20, 0);
  scene.add(light);

  // 6️ Подложка/пол
  const floorGeometry = new THREE.PlaneGeometry(20, 20);
  const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x111111 });
  const floor = new THREE.Mesh(floorGeometry, floorMaterial);
  floor.rotation.x = -Math.PI / 2;
  scene.add(floor);

  // 7️ Анимация
  function animate() {
      renderer.setAnimationLoop(() => {
          renderer.render(scene, camera);
      });
  }
  animate();

  // 8️ Подстройка под окно
  window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // 9️ VR кнопка вручную
  const vrButton = document.getElementById('vrButton');
  vrButton.addEventListener('click', async () => {
    if (navigator.xr) {
      try {
        const session = await navigator.xr.requestSession('immersive-vr', { optionalFeatures: ['local-floor'] });
        renderer.xr.setSession(session);
      } catch(e) {
        alert("Ваш браузер или устройство не поддерживает VR: " + e);
      }
    } else {
      alert("WebXR не поддерживается в этом браузере");
    }
  });
</script>
<script src="script.js"></script>
<div class="ai-container">
    <div class="ai-sphere" id="aiSphere"></div>
    <button id="voiceBtn">🎤</button>
    <div id="voiceText">AIDUX готов</div>
</div>
</body>
</html>
